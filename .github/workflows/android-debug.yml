name: Android Debug CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.2

    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.2
        chmod +x gradlew

    - name: Download Web Assets
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release download AssetStorage --repo ${{ github.repository }} --pattern "dist.zip"
        mkdir -p app/src/main/assets
        unzip dist.zip -d app/src/main/assets/
        rm dist.zip

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Get Version Name
      id: get_version
      run: |
        VERSION_NAME=$(grep "versionName" app/build.gradle | awk '{print $2}' | tr -d '\"' | tr -d '[:space:]')
        echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT

    - name: Rename APK
      run: |
        OLD_PATH="app/build/outputs/apk/debug/app-debug.apk"
        NEW_NAME="WeWebViewWrapper-debug-v${{ steps.get_version.outputs.VERSION_NAME }}.apk"
        NEW_PATH="app/build/outputs/apk/debug/$NEW_NAME"
        mv "$OLD_PATH" "$NEW_PATH"
        echo "DEBUG_APK_PATH=$NEW_PATH" >> $GITHUB_ENV

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: we-webview-wrapper-debug-apk
        path: ${{ env.DEBUG_APK_PATH }}